<!doctype html>
<html lang="ko"><head><meta charset="utf-8">
<title>All screens</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>html,body{margin:0;background:#EAE3D4;padding:24px;font-family:var(--font-ui);}
.grid{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;}
.label{text-align:center;font-size:13px;color:var(--fg-3);margin-top:10px;font-weight:500;}</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head><body>
<div id="root"></div>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="ComposeScreen.jsx"></script>
<script type="text/babel" src="BrowseScreen.jsx"></script>
<script type="text/babel" src="SearchScreen.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="grid">
      <div><Phone><HomeScreen active="home" onTabChange={()=>{}} onCompose={()=>{}} onSearch={()=>{}} /></Phone><div className="label">홈</div></div>
      <div><Phone><ComposeScreen onClose={()=>{}} /></Phone><div className="label">작성</div></div>
      <div><Phone><BrowseScreen active="browse" onTabChange={()=>{}} onCompose={()=>{}} /></Phone><div className="label">탐색</div></div>
      <div><Phone><SearchScreen active="search" onTabChange={()=>{}} onCompose={()=>{}} /></Phone><div className="label">검색</div></div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body></html>
