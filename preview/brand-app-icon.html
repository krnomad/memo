<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; gap: 24px; align-items: center; padding: 12px 0; }
  .icon {
    width: 88px; height: 88px;
    border-radius: 22.37%;
    background: var(--paper-100);
    display: flex; align-items: center; justify-content: center;
    box-shadow: inset 0 0 0 0.5px var(--line-1);
    position: relative; overflow: hidden;
  }
  .icon .glyph {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 64px;
    line-height: 1;
    color: var(--terracotta-500);
    margin-top: -4px;
  }
  /* Variant — accent fill */
  .icon.fill { background: var(--terracotta-500); box-shadow: none; }
  .icon.fill .glyph { color: var(--paper-50); }
  .icon.dark { background: var(--ink-900); }
  .icon.dark .glyph { color: var(--paper-50); }
  /* Light/dot variant */
  .icon .dot {
    position: absolute; bottom: 16px; right: 16px;
    width: 8px; height: 8px; border-radius: 50%; background: var(--terracotta-500);
  }
  .col { display: flex; flex-direction: column; gap: 4px; }
  .col .name { font: 600 14px/20px var(--font-ui); color: var(--fg-1); }
  .col .desc { font: 400 12px/16px var(--font-ui); color: var(--fg-3); }
</style>
</head>
<body>
<div class="preview" style="padding:20px 24px;">
  <div class="row">
    <div class="icon"><span class="glyph">m</span><span class="dot"></span></div>
    <div class="col"><span class="name">light · default</span><span class="desc">paper-100 ground · terracotta wordmark · 22.37% squircle</span></div>
  </div>
  <div class="row">
    <div class="icon fill"><span class="glyph">m</span></div>
    <div class="col"><span class="name">accent · marketing</span><span class="desc">terracotta-500 fill, paper-50 glyph</span></div>
  </div>
  <div class="row">
    <div class="icon dark"><span class="glyph">m</span></div>
    <div class="col"><span class="name">dark · home-screen alt</span><span class="desc">ink-900 ground · paper-50 glyph</span></div>
  </div>
</div>
</body></html>
