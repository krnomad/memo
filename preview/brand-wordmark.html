<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .wordmark {
    font-family: var(--font-display);
    font-style: italic;
    font-weight: 400;
    font-size: 96px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--ink-900);
  }
  .tagline {
    font-family: var(--font-ui);
    font-size: 14px;
    color: var(--fg-3);
    letter-spacing: 0.04em;
    text-transform: lowercase;
    margin-top: 12px;
  }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); display: inline-block; vertical-align: middle; margin-bottom: 14px; }
</style>
</head>
<body>
<div class="preview" style="display:flex; align-items:center; gap:24px; padding: 32px 40px;">
  <div>
    <span class="dot"></span><span class="wordmark">mull</span>
    <div class="tagline">a calm place for messy thinkers</div>
  </div>
</div>
</body></html>
