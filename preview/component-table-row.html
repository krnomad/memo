<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .group { background: #fff; border-radius: 14px; overflow: hidden; box-shadow: inset 0 0 0 0.5px var(--line-1); }
  .row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; min-height: 44px; }
  .row + .row { border-top: 0.5px solid var(--line-1); }
  .row .title { font: 400 17px/22px var(--font-ui); color: var(--fg-1); letter-spacing: -0.4px; flex: 1; }
  .row .preview { font: 400 13px/18px var(--font-ui); color: var(--fg-3); margin-top: 2px; }
  .row .date { font: 400 15px/20px var(--font-ui); color: var(--fg-3); }
  .row .chev { color: var(--ink-300); }
  .row.note { padding: 12px 16px; align-items: flex-start; }
  .note .col { display:flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .note .col .t { font: 600 17px/22px var(--font-ui); color: var(--fg-1); letter-spacing: -0.4px; }
  .note .col .p { font: 400 13px/18px var(--font-ui); color: var(--fg-3); }
  .note .right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }
</style>
</head>
<body>
<div class="preview" style="padding:18px;">
  <div class="group">
    <div class="row note">
      <div class="col">
        <span class="t">Kitchen renovation</span>
        <span class="p">She mentioned tile samples at dinner. Let me see what…</span>
      </div>
      <div class="right">
        <span class="date">Mon</span>
        <span class="dot"></span>
      </div>
    </div>
    <div class="row note">
      <div class="col">
        <span class="t">Notes from the airport</span>
        <span class="p">Two hours to kill. Trying to remember whether I…</span>
      </div>
      <div class="right"><span class="date">Sun</span></div>
    </div>
    <div class="row">
      <span class="title">Voice memos</span>
      <span class="date">12</span>
      <svg class="chev" width="8" height="14" viewBox="0 0 8 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 1 7 7 1 13"/></svg>
    </div>
  </div>
</div>
</body></html>
