<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); width: 100%; margin: 6px 0 2px; }
  /* Primary */
  .btn-primary {
    font-family: var(--font-ui); font-size: 17px; font-weight: 600; letter-spacing: -0.4px;
    color: var(--accent-on); background: var(--accent);
    border: 0; border-radius: 999px; padding: 12px 20px; cursor: pointer;
    transition: background var(--dur-fast) var(--ease-standard);
  }
  .btn-primary:hover { background: var(--terracotta-700); }
  .btn-primary.pressed { background: var(--terracotta-700); opacity: 0.85; }
  .btn-primary[disabled] { background: var(--paper-300); color: var(--fg-4); }
  /* Secondary */
  .btn-secondary {
    font-family: var(--font-ui); font-size: 17px; font-weight: 600;
    color: var(--fg-1); background: #fff;
    border: 0; border-radius: 999px; padding: 12px 20px; cursor: pointer;
    box-shadow: inset 0 0 0 1px var(--line-1);
  }
  .btn-secondary:hover { background: var(--paper-200); }
  /* Plain (iOS text) */
  .btn-plain {
    font-family: var(--font-ui); font-size: 17px; font-weight: 400; letter-spacing: -0.4px;
    color: var(--accent); background: transparent;
    border: 0; padding: 12px 8px; cursor: pointer;
  }
  .btn-plain.bold { font-weight: 600; }
  /* Destructive */
  .btn-destructive {
    font-family: var(--font-ui); font-size: 17px; font-weight: 600;
    color: var(--destructive); background: #fff;
    border: 0; border-radius: 999px; padding: 12px 20px; cursor: pointer;
    box-shadow: inset 0 0 0 1px var(--line-1);
  }
</style>
</head>
<body>
<div class="preview" style="padding:24px;">
  <div class="lbl">primary · secondary · plain · destructive</div>
  <div class="row">
    <button class="btn-primary">New note</button>
    <button class="btn-secondary">Cancel</button>
    <button class="btn-plain">Done</button>
    <button class="btn-plain bold">Save</button>
    <button class="btn-destructive">Delete</button>
  </div>
  <div class="lbl">states</div>
  <div class="row">
    <button class="btn-primary">Default</button>
    <button class="btn-primary pressed">Pressed</button>
    <button class="btn-primary" disabled>Disabled</button>
  </div>
</div>
</body></html>
