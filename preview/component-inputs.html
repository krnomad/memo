<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .field {
    background: #fff;
    border-radius: 10px;
    padding: 11px 14px;
    display: flex; align-items: center; gap: 8px;
    box-shadow: inset 0 0 0 0.5px var(--line-1);
    margin-bottom: 12px;
  }
  .field input { border:0; outline:0; flex:1; font: 400 17px/22px var(--font-ui); color: var(--fg-1); background: transparent; letter-spacing: -0.4px; }
  .field input::placeholder { color: var(--fg-4); }
  .field.focus { box-shadow: inset 0 0 0 2px var(--accent); }
  .search-field {
    background: var(--paper-200);
    border-radius: 10px;
    padding: 7px 8px;
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 12px;
  }
  .search-field svg { color: var(--fg-3); }
  .search-field input { border:0; outline:0; flex:1; font: 400 17px/22px var(--font-ui); background: transparent; letter-spacing: -0.4px; }
  .search-field input::placeholder { color: var(--fg-3); }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="preview" style="padding:24px;">
  <div class="lbl">text field · default / focused</div>
  <div class="field"><input placeholder="Note title"></div>
  <div class="field focus"><input value="Kitchen renovation thoughts"></div>
  <div class="lbl">search field · iOS standard</div>
  <div class="search-field">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input placeholder="Search">
  </div>
</div>
</body></html>
