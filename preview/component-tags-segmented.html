<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 6px; }
  .chip {
    font: 400 13px/18px var(--font-ui);
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--paper-200);
    color: var(--fg-2);
  }
  .chip.accent { background: var(--accent-soft); color: var(--terracotta-700); }
  .chip.ai { background: var(--ai-tint-soft); color: var(--sage-700); }
  .chip.outline { background: #fff; box-shadow: inset 0 0 0 0.5px var(--line-1); color: var(--fg-2); }
  .chip .x { margin-left: 4px; color: var(--fg-3); cursor: pointer; }
  .segmented {
    display: inline-flex;
    background: var(--paper-200);
    padding: 2px;
    border-radius: 9px;
    gap: 0;
  }
  .segmented .seg {
    font: 500 13px/18px var(--font-ui);
    color: var(--fg-2);
    padding: 6px 14px;
    border-radius: 7px;
    border: 0; background: transparent; cursor: pointer;
  }
  .segmented .seg.active {
    background: #fff;
    color: var(--fg-1);
    box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 0 0 0.5px rgba(0,0,0,0.04);
  }
</style>
</head>
<body>
<div class="preview" style="padding:20px 24px;">
  <div class="lbl">tags · user-applied</div>
  <div class="row">
    <span class="chip accent">kitchen</span>
    <span class="chip accent">renovation</span>
    <span class="chip accent">budget</span>
    <span class="chip outline">+ Add</span>
  </div>
  <div class="lbl">tags · AI-suggested</div>
  <div class="row">
    <span class="chip ai">house</span>
    <span class="chip ai">decision</span>
    <span class="chip ai">spring</span>
  </div>
  <div class="lbl">segmented picker</div>
  <div class="segmented">
    <button class="seg active">All</button>
    <button class="seg">Journal</button>
    <button class="seg">Voice</button>
  </div>
</div>
</body></html>
