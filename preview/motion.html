<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .strip { display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .row .label { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 110px; }
  .row .demo  { flex: 1; }
  .ease-box {
    height: 28px; position: relative;
    background: var(--paper-200); border-radius: 6px; overflow: hidden;
  }
  .ease-box .ball {
    position: absolute; top: 4px; left: 4px; width: 20px; height: 20px;
    background: var(--accent); border-radius: 50%;
    animation-duration: 1.6s; animation-iteration-count: infinite;
    animation-direction: alternate;
  }
  @keyframes slide { from { left: 4px } to { left: calc(100% - 24px) } }
  .e-standard .ball { animation-name: slide; animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
  .e-ios .ball      { animation-name: slide; animation-timing-function: cubic-bezier(0.32, 0.72, 0, 1); }
  .e-soft .ball     { animation-name: slide; animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
  .note { font: 400 12px/18px var(--font-ui); color: var(--fg-3); margin-top: 12px; padding-top:12px; border-top: 0.5px solid var(--line-1);}
</style>
</head>
<body>
<div class="preview" style="padding:18px 22px;">
  <div class="strip">
    <div class="row"><span class="label">ease-standard</span><div class="demo ease-box e-standard"><div class="ball"></div></div></div>
    <div class="row"><span class="label">ease-ios</span>     <div class="demo ease-box e-ios"><div class="ball"></div></div></div>
    <div class="row"><span class="label">ease-out-soft</span><div class="demo ease-box e-soft"><div class="ball"></div></div></div>
  </div>
  <div class="note">Durations: <span class="t-mono" style="color:var(--fg-2)">120ms · 220ms · 360ms</span>. No bounces. No overshoot. Mull settles.</div>
</div>
</body></html>
