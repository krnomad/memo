<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">

      <div class="meta">t-hero · Newsreader 300<br><span class="sub">56 / 60</span></div>

    <div class="item">
      <div class="meta">t-display · Newsreader 300<br><span class="sub">40 / 44</span></div>
