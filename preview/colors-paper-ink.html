<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .swatch {
    aspect-ratio: 1.2 / 1;
    border-radius: 10px;
    box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.06);
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 10px;
  }
  .swatch .name { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.85); }
  .swatch.light .name { color: var(--fg-2); }
  .swatch .hex  { font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.6); }
  .swatch.light .hex { color: var(--fg-3); }
</style>
</head>
<body>
<div class="preview" style="padding:20px;">
  <div class="grid">
    <div class="swatch light" style="background:var(--paper-50)"> <div class="name">paper-50</div><div class="hex">#FBF8F2</div></div>
    <div class="swatch light" style="background:var(--paper-100)"><div class="name">paper-100</div><div class="hex">#F6F2EA</div></div>
    <div class="swatch light" style="background:var(--paper-200)"><div class="name">paper-200</div><div class="hex">#EFE9DD</div></div>
    <div class="swatch light" style="background:var(--paper-300)"><div class="name">paper-300</div><div class="hex">#E5DDCC</div></div>
    <div class="swatch"       style="background:var(--paper-400)"><div class="name">paper-400</div><div class="hex">#BFB6A2</div></div>
    <div class="swatch"       style="background:var(--ink-300)"> <div class="name">ink-300</div><div class="hex">#A29C8E</div></div>
    <div class="swatch"       style="background:var(--ink-500)"> <div class="name">ink-500</div><div class="hex">#6E695E</div></div>
    <div class="swatch"       style="background:var(--ink-700)"> <div class="name">ink-700</div><div class="hex">#3A3833</div></div>
    <div class="swatch"       style="background:var(--ink-900)"> <div class="name">ink-900</div><div class="hex">#1B1A17</div></div>
    <div class="swatch light" style="background:#ffffff;box-shadow:inset 0 0 0 0.5px var(--line-1)"><div class="name">card</div><div class="hex">#FFFFFF</div></div>
    <div class="swatch"       style="background:var(--night-800)"><div class="name">night-800</div><div class="hex">#1F1D18</div></div>
    <div class="swatch"       style="background:var(--night-900)"><div class="name">night-900</div><div class="hex">#14130F</div></div>
  </div>
</div>
</body></html>
