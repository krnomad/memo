<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_preview.css">
<style>
  .row { display: flex; align-items: flex-end; gap: 24px; flex-wrap: wrap; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { background: var(--accent); border-radius: 4px; height: 28px; }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
  .px   { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); }
</style>
</head>
<body>
<div class="preview" style="padding:24px;">
  <div class="row">
    <div class="cell"><div class="bar" style="width: 4px"></div>   <div class="name">s-1</div>  <div class="px">4</div></div>
    <div class="cell"><div class="bar" style="width: 8px"></div>   <div class="name">s-2</div>  <div class="px">8</div></div>
    <div class="cell"><div class="bar" style="width: 12px"></div>  <div class="name">s-3</div>  <div class="px">12</div></div>
    <div class="cell"><div class="bar" style="width: 16px"></div>  <div class="name">s-4</div>  <div class="px">16</div></div>
    <div class="cell"><div class="bar" style="width: 20px"></div>  <div class="name">s-5</div>  <div class="px">20</div></div>
    <div class="cell"><div class="bar" style="width: 24px"></div>  <div class="name">s-6</div>  <div class="px">24</div></div>
    <div class="cell"><div class="bar" style="width: 32px"></div>  <div class="name">s-8</div>  <div class="px">32</div></div>
    <div class="cell"><div class="bar" style="width: 40px"></div>  <div class="name">s-10</div> <div class="px">40</div></div>
    <div class="cell"><div class="bar" style="width: 48px"></div>  <div class="name">s-12</div> <div class="px">48</div></div>
    <div class="cell"><div class="bar" style="width: 64px"></div>  <div class="name">s-16</div> <div class="px">64</div></div>
    <div class="cell"><div class="bar" style="width: 80px"></div>  <div class="name">s-20</div> <div class="px">80</div></div>
  </div>
  <div style="margin-top: 18px; font-size: 12px; color: var(--fg-3); font-family: var(--font-ui);">
    4px base. <span class="t-mono" style="color:var(--fg-2)">--s-4</span> (16px) is the iOS gutter — use it for screen-edge insets.
  </div>
</div>
</body></html>
